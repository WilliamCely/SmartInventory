spring:
  application:
    name: inventory-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/smart_inventory}
    username: ${SPRING_DATASOURCE_USERNAME:admin_user}
    password: ${SPRING_DATASOURCE_PASSWORD:change-me-db-password}
  jpa:
    hibernate:
      ddl-auto: update # Crea las tablas automáticamente si no existen
    show-sql: false
  threads:
    virtual:
      enabled: true # Vital para las llamadas de larga duración a la IA

server:
  port: 8081
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}

app:
  ai:
    analysis-url: ${AI_ANALYSIS_URL:http://ai-service:8082/api/v1/ai/analyze-stock}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-32-bytes-minimum-key}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

