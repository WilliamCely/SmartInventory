services:
  db:
    image: postgres:17-alpine
    container_name: inventory_db
    restart: always
    environment:
      POSTGRES_DB: smart_inventory
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: pass2026
    ports:
      - "5436:5432"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    ports:
      - "8080:8080"

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smart_inventory
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: pass2026
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-bytes-minimum-key}
    depends_on:
      - db
      - eureka-server

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/smart_inventory
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: pass2026
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      AI_ANALYSIS_URL: http://ai-service:8082/api/v1/ai/analyze-stock
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-bytes-minimum-key}
    depends_on:
      - db
      - eureka-server
      - ai-service

  ai-service:
    build: ./ai-service
    container_name: ai-service
    restart: always
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID:-smart-inventory-dev}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      VERTEX_GEMINI_MODEL: ${VERTEX_GEMINI_MODEL:-gemini-1.5-flash}
      # En cloud, la autenticación debe venir de Service Account / Workload Identity.
    depends_on:
      - eureka-server

  import-service:
    build: ./import-service
    container_name: import-service
    restart: always
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      INVENTORY_API_BASE_URL: http://inventory-service:8081/api/v1
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32-bytes-minimum-key}
    depends_on:
      - eureka-server
      - inventory-service

  inventory-ui:
    build: ./smart-inventory-ui
    container_name: inventory-ui
    depends_on:
      - api-gateway
    ports:
      - "3000:80"

volumes:
  postgres_data:
