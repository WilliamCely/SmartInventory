spring:
  application:
    name: import-service
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8085}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

app:
  inventory:
    base-url: ${INVENTORY_API_BASE_URL:http://localhost:8080/api/v1}
  security:
    jwt:
      secret: ${JWT_SECRET:smartinventory-very-secret-key-change-in-prod-2026-1234567890}
